name: Build NoRoot Module APKs
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - ShizukuSceneFix
          - GameUnlockerPro_NoRoot
          - MicroXEnhancer
          - PrivacyGuard_NoRoot
          - AdBlockerX_NoRoot
          - BatteryOptimizer_NoRoot
          - StepModifier_NoRoot
          - NotifyMaster_NoRoot
          - AudioBoost_NoRoot
          - VipUnlocker_NoRoot
          - VideoSaver_NoRoot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'
      - name: Generate Gradle Wrapper
        working-directory: modules/${{ matrix.module }}
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin
      - name: Build Release APK
        working-directory: modules/${{ matrix.module }}
        env:
          MJH_STORE_PASSWORD: ${{ secrets.MJH_STORE_PASSWORD }}
          MJH_KEY_ALIAS: ${{ secrets.MJH_KEY_ALIAS }}
          MJH_KEY_PASSWORD: ${{ secrets.MJH_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
      - name: Rename APK
        run: mv modules/${{ matrix.module }}/app/build/outputs/apk/release/app-release.apk ${{ matrix.module }}.apk 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-apk
          path: ${{ matrix.module }}.apk
  health-check:
    name: Health Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run healthcheck
        run: python scripts/healthcheck.py > web/public/health-report.json
      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: web/public/health-report.json

  release:
    name: Publish APKs
    needs: [build, health-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-apks
      - name: Flatten
        run: |
          mkdir -p release-assets
          find all-apks -name "*.apk" | while read f; do cp "$f" "release-assets/$(basename "$f")"; done
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.14
          name: LSPatch-Noroot-modle v1.0.14
          body: "## LSPatch-Noroot-modle v1.0.14

11 NoRoot LSPatch modules — Material 3 UI | Three Iron Laws architecture

| 模块 | 功能 |
|------|------|
| AdBlockerX | WebView/OkHttp/域名黑名单广告拦截 |
| AudioBoost | 音量突破上限/均衡器/分应用音量 |
| BatteryOptimizer | WakeLock/Alarm/Job 调度省电优化 |
| GameUnlockerPro | 帧率解锁/机型伪装/触控优化 |
| MicroXEnhancer | 微信/QQ 防撤回/去广告/美化 |
| NotifyMaster | 通知过滤/防撤回/历史记录管理 |
| PrivacyGuard | 设备ID/位置/传感器隐私保护 |
| ShizukuSceneFix | Shizuku Scene 授权修复 |
| StepModifier | 步数/轨迹/心率传感器修改 |
| VideoSaver | 抖音/快手/小红书去水印下载 |
| VipUnlocker | VIP解锁/广告移除/验证绕过 |

开发者: MJH | github.com/AceGuru-mjh/LSPatch-Noroot-modle"
          files: release-assets/*.apk
          prerelease: false
          draft: false
